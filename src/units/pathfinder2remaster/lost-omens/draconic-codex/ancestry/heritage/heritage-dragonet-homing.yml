unit: heritage/dragonet/remaster/homing
in: heritage/dragonet
group: "_{Player Core}"
name: "_{Homing Dragonet}"

inc:
  # set the heritage name
  - set: heritage
    value: "_{Homing Dragonet}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Homing Dragonet}"
        contents:
          # simple description
          - p: "_{Always know distance and direction to home.}"
          - hr: 
            light: true
          - paste: cantrip/daze
          
