unit: heritage/dragonet/remaster/homing
in: heritage/dragonet
group: "_{Player Core}"
name: "_{Homing Dragonet}"

inc:
  # set the heritage name
  - set: heritage
    value: "_{Homing Dragonet}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Witch Kholo}"
        contents:
          # simple description
          - value-block: "+1"
            content: "_{Inpersonate or Create a Diversion with your voice}"
          - hr: 
            light: true
          - paste: cantrip/figment
