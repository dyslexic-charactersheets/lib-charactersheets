unit: heritage/dragonet/remaster/fey
in: heritage/dragonet
group: "_{Player Core}"
name: "_{Fey Dragonet}"

inc:
  # set the heritage name
  - set: heritage
    value: "_{Fey Dragonet}"

  # set languages
  - set: languages
    value: "_{Common}, _{Draconic}, _{Fey}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Fey Dragonet}"
        contents:
          - flags:
            - "_{Fey}"
          # simple description
          - p: "_{Change the color and pattern of your wings as 1 action.}"
          - value-block: "_{+2}"
            content: "_{to Stealth when matching your surroundings.}"
            
