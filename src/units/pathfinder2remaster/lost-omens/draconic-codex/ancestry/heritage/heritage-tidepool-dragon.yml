unit: heritage/dragonet/remaster/tidepool
in: heritage/dragonet
group: "_{Player Core}"
name: "_{Tidepool Dragonet}"

inc:
  # set the heritage name
  - set: heritage
    value: "_{Tidepool Dragonet}"

  # set languages
  - set: languages
    value: "_{Common}, _{Draconic}, _{Thalassic}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Tidepool Dragonet}"
        contents:
          - flags:
            - "_{Amphibious}"
          # simple description
          - value-block: "_{15ft}"
            width: medium
            content: "_{Swim speed}"
