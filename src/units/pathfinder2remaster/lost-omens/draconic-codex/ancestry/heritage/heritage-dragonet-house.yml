unit: heritage/dragonet/remaster/house
in: heritage/dragonet
group: "_{Player Core}"
name: "_{House Dragonet}"

inc:
  # set the heritage name
  - set: heritage
    value: "_{House Dragonet}"

  # set languages
  - set: languages
    value: "_{Common}, _{Draconic}, _{Diabolic}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{House Dragonet}"
        contents:
          # simple description
          - p: "_{Your Jaws count as sliver.}"
          - value-block: "_{+1}"
            content: "_{to damage rolls vs fiends.}"
            
