unit: ancestry/remaster/dragonet
in: ancestry
group: "_{Draconic Codex}"
name: "_{Dragonet}"

form:
  - select: heritage/dragonet
    name: "_{Dragonet Heritage}"
    max: 1

inc:
  - set: ancestry
    value: "_{Dragonet}"
  - set: hp-ancestry
    value: 8
# set darkvision / low vision light
  - set: perception-darkvision
    value: true
# stat boosts
  - set: build-boost-DEX-ancestry
    value: 1
  - set: build-boost-CHA-ancestry
    value: 1
  - set: build-boost-CON-ancestry
    value: -1
# set languages
  - set: languages
    value: "_{Common}, _{Draconic}"

# write ancestry short descriptions
  - at: '@ancestry'
    replace:
      - article: ancestry
        title: "_{Dragonet}"
        contents:
          - flags:
              - "_{Dragonet}"
              - "_{Dragon}"
          - field: ancestry-speed
            frame: right
            label: "_{Speed}"
            control: value
            value: "20_{ft}"
          # copy in the low light / dark vision description
          - paste: darkvision
          - hr:
            light: true
          - p:
            title: "_{Wings}"
            content: "_{Take no damage from falling any distance.}"
          - paste: natural-weapon
            params:
              name: "_{Big Sharp Teeth}"
              damage: "_{1d4}"
              type: "_{Piercing}"
          - flags:
              - "_{Brawling}"
              - "_{Finesse}"
              - "_{Unarmed}"

  # create natural attack stat block
  - at: '@actions'
    add:
      - action: 1
        contents:
          - article:
            title: "_{Big Sharo Teeth}"
            contents:
              - paste: natural-weapon-action
                params:
                  id: dragonet/bigsharpteeth
                  name: "_{Big Sharp Teeth}"
                  damage: "_{1d4}"
                  type: "_{P}"
              - flags:
                  - "_{Brawling}"
                  - "_{Finesse}"
                  - "_{Unarmed}"
