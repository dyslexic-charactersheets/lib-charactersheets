unit: heritage/orc/remaster/winter
in: heritage/apg/orc
group: "_{Player Core}"
name: "_{Winter Orc}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Winter Orc}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Winter Orc}"
        contents:
          # simple description
          - p: "_{Trained in Survival}"
            icon: proficiency-trained
          # temperature adjustment
          - paste: temperature-tolerance
            params: 
              temp: "_{cold}"
