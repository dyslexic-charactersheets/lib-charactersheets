unit: heritage/orc/remaster/grave
in: heritage/apg/orc
group: "_{Player Core}"
name: "_{Grave Orc}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Grave Orc}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Grave Orc}"
        contents:
          # simple description
          - value-block: "_{+1}"
            content: "_{Saves vs Death or Void effects}"
          - hr:
            light: true
          - paste: leveled-damage-resist
            params:
              id: orc/grave/void-resistance
              type: "_{Void}"

  # add a heritage savign throw reaction with a numeric bonus
  - at: '@saving-throws'
    add:
      - p:
        title: "_{Grave Orc}"
      - value-block: "_{+1}"
        content: "_{Saves vs Death or Void effects}"

  # add a damage resist
  - at: '@health'
    add:
      - paste: leveled-damage-resist-health
        params:
          id: orc/grave/health-void-resistance
          type: "_{Void}"


                
