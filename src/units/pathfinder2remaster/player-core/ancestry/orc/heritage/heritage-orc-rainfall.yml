unit: heritage/orc/remaster/rainfall
in: heritage/apg/orc
group: "_{Player Core}"
name: "_{Rainfall Orc}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Rainfall Orc}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Rainfall Orc}"
        contents:
          # simple description
          - value-block: "+2"
            content: "_{Athletics checks to Climb or Swim}"
          - value-block: "+1"
            content: "_{Saves vs Disease}"

  # add a heritage savign throw reaction with a numeric bonus
  - at: '@saving-throws'
    add:
      - p:
        title: "_{Rainfall Orc}"
      - value-block: "_{+1}"
        content: "_{Saves vs Disease}"
