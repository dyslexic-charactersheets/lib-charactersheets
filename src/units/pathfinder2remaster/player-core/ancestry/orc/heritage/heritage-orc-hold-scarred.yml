unit: heritage/orc/remaster/hold-scarred
in: heritage/apg/orc
group: "_{Player Core}"
name: "_{Hold-Scarred Orc}"
# enabled: false

require:
  - unit: feat/diehard
  
inc:
  # set the heritage name
  - set: heritage
    value: "_{Hold-Scarred Orc}"

  - set: hp-ancestry
    value: 12
    priority: high

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Hold-Scarred Orc}"
        contents:
          # simple description
          - paste: feat/diehard
