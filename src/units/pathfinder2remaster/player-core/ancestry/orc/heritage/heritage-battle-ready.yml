unit: heritage/orc/remaster/battle-ready
in: heritage/apg/orc
group: "_{Player Core}"
name: "_{Battle-Ready Orc}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Battle-Ready Orc}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Battle-Ready Orc}"
        contents:
          # simple description
          - p: "_{Trained in Intimidation}"
            icon: proficiency-trained
          - paste: feat/intimidating-glare
