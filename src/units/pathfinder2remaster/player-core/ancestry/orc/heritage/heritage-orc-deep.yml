unit: heritage/orc/remaster/deep
in: heritage/apg/orc
group: "_{Player Core}"
name: "_{Deep Orc}"
# enabled: false

require:
  - unit: feat/terrain-expertise
  - unit: feat/combat-climber

inc:
  # set the heritage name
  - set: heritage
    value: "_{Deep Orc}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Deep Orc}"
        contents:
          # simple description
          - paste: feat/terrain-expertise
            params:
              terrain: "_{underground}"
          - hr:
            light: true
          - paste: feat/combat-climber
