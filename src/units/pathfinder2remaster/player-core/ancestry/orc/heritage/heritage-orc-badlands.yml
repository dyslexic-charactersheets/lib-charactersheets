unit: heritage/orc/remaster/badlands
in: heritage/apg/orc
group: "_{Player Core}"
name: "_{Badlands Orc}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Badlands Orc}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Badlands Orc}"
        contents:
          # simple description
          - p: "_{Can hustle twice as long while exploring.}"
          #  temperature adjustment
          - paste: temperature-tolerance
            params: 
              temp: "_{heat}"
